env:
  HF_HOME: /scratch/e1554543/avatar_system_full/cache/hf
  XDG_CACHE_HOME: /scratch/e1554543/avatar_system_full/cache/xdg
  MODELSCOPE_CACHE: /scratch/e1554543/avatar_system_full/cache/modelscope
  NLTK_DATA: /scratch/e1554543/avatar_system_full/cache/nltk_data
  OPENAI_BASE_URL: https://openrouter.ai/api/v1
  LLM_MODEL: openai/gpt-oss-120b:free

perception:
  model: small
  language: Chinese
  speaker_id: user
  ser_model: iic/emotion2vec_plus_seed

tts:
  speaker_id: 6224
  prompt_mode: goal
  wrap_sos_eos: true

tts_worker:
  enabled: true
  url: http://127.0.0.1:8788
  timeout: 120

avamerg_worker:
  enabled: true
  url: http://127.0.0.1:8789
  timeout: 240

deeptalk_worker:
  enabled: true
  url: http://127.0.0.1:8790
  timeout: 180

perception_worker:
  enabled: true
  url: http://127.0.0.1:8791
  timeout: 180

merge:
  expr_scale: 1.0
  jaw_scale: 1.0
  # Lip-sync tuning knobs. Negative temporal_shift_frames advances mouth motion.
  jaw_open_scale:
  jaw_side_scale:
  jaw_twist_scale:
  mouth_open_bias: 0.0
  temporal_shift_frames: 0
  smooth_window: 1
  zero_translation: true

runtime:
  run_root: /scratch/e1554543/avatar_system_full/outputs
  viewer_detached: true
