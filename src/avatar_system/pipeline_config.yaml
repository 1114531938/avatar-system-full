paths:
  perception_root: ${PROJECT_ROOT}/integrations/perception
  perception_venv: ${PROJECT_ROOT}/runtime/cache/venvs/perception
  perception_out_dir: ${PROJECT_ROOT}/runtime/outputs/perception/merged
  perception_task1_out_dir: ${PROJECT_ROOT}/runtime/outputs/perception/task1

  avamerg_root: ${PROJECT_ROOT}/integrations/avamerg
  avamerg_venv: ${PROJECT_ROOT}/integrations/avamerg/.avamerg38
  avamerg_reply_out_dir: ${PROJECT_ROOT}/integrations/avamerg/outputs/infer_custom

  emotivoice_root: ${PROJECT_ROOT}/integrations/emotivoice
  emotivoice_venv: ${PROJECT_ROOT}/integrations/emotivoice/.EmotiVoice
  emotivoice_input_dir: ${PROJECT_ROOT}/runtime/cache/emotivoice/input
  emotivoice_frontend_py: ${PROJECT_ROOT}/integrations/emotivoice/frontend.py
  json_to_emotivoice_script: ${PROJECT_ROOT}/integrations/avamerg/json_to_emotivoice_input.py
  emotivoice_output_wav_glob: ${PROJECT_ROOT}/integrations/emotivoice/outputs/prompt_tts_open_source_joint/test_audio/audio/g_00140000/*.wav

  deeptalk_root: ${PROJECT_ROOT}/integrations/deeptalk/DEEPTalk
  deeptalk_venv: ${PROJECT_ROOT}/runtime/cache/venvs/deeptalk
  deeptalk_output_npy: ${PROJECT_ROOT}/integrations/deeptalk/DEEPTalk/outputs/params/1.npy
  deeptalk_merge_script: ${PROJECT_ROOT}/integrations/deeptalk/avatar_system_helpers/deeptalk_to_demo_flame_param.py

  gaussian_root: ${PROJECT_ROOT}/integrations/gaussian_avatar
  gaussian_venv: ${PROJECT_ROOT}/integrations/gaussian_avatar/.GSavatar_glibc
  gaussian_container_image: ${PROJECT_ROOT}/runtime/containers/gaussianav_jammy

env:
  HF_HOME: ${PROJECT_ROOT}/runtime/cache/hf
  XDG_CACHE_HOME: ${PROJECT_ROOT}/runtime/cache/xdg
  MODELSCOPE_CACHE: ${PROJECT_ROOT}/runtime/cache/modelscope
  NLTK_DATA: ${PROJECT_ROOT}/runtime/cache/nltk_data
  OPENAI_BASE_URL: https://openrouter.ai/api/v1
  LLM_MODEL: openai/gpt-oss-120b:free

perception:
  model: small
  language: Chinese
  speaker_id: user
  ser_model: iic/emotion2vec_plus_seed

tts:
  speaker_id: 6224
  prompt_mode: goal
  wrap_sos_eos: true

tts_worker:
  enabled: true
  url: http://127.0.0.1:8788
  timeout: 120

avamerg_worker:
  enabled: true
  url: http://127.0.0.1:8789
  timeout: 240

deeptalk_worker:
  enabled: true
  url: http://127.0.0.1:8790
  timeout: 180

perception_worker:
  enabled: true
  url: http://127.0.0.1:8791
  timeout: 180

merge:
  expr_scale: 1.0
  jaw_scale: 1.0
  # Lip-sync tuning knobs. Negative temporal_shift_frames advances mouth motion.
  jaw_open_scale:
  jaw_side_scale:
  jaw_twist_scale:
  mouth_open_bias: 0.0
  temporal_shift_frames: 0
  smooth_window: 1
  zero_translation: true

runtime:
  run_root: ${PROJECT_ROOT}/runtime/outputs
  viewer_detached: true
