<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Emotional Phone Booth</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=3depb-transparent-avatar-video-20260627-04" />
  </head>
  <body>
    <div id="app">
      <main class="page login-page">
        <section class="login-shell">
          <div class="brand-stage">
            <div class="booth-visual" aria-hidden="true"></div>
            <div class="brand-copy">
              <h1 class="brand-title">3D Emotional Phone Booth</h1>
              <p class="brand-subtitle">Loading interface...</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script>
      window.addEventListener("error", function (event) {
        var app = document.getElementById("app");
        if (!app) return;
        app.innerHTML =
          '<main class="page login-page"><section class="login-shell"><form class="auth-card">' +
          "<h2>Interface failed to load</h2>" +
          '<p class="error">' +
          String(event.message || "Unknown browser error").replace(/[&<>"']/g, function (char) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
          }) +
          "</p></form></section></main>";
      });
      window.addEventListener("unhandledrejection", function (event) {
        var app = document.getElementById("app");
        if (!app) return;
        var reason = event.reason && event.reason.message ? event.reason.message : event.reason;
        app.innerHTML =
          '<main class="page login-page"><section class="login-shell"><form class="auth-card">' +
          "<h2>Interface failed to load</h2>" +
          '<p class="error">' +
          String(reason || "Unknown browser error").replace(/[&<>"']/g, function (char) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
          }) +
          "</p></form></section></main>";
      });
    </script>
    <script type="module" src="./app.js?v=3depb-transparent-avatar-video-20260627-04"></script>
  </body>
</html>
